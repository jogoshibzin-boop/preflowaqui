<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendando Passaporte</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .cookie-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .logo-text {
      text-align: left;
      line-height: 1.1;
    }

    .logo-text .line1 {
      font-size: 18px;
      font-weight: 400;
      color: #2d2d2d;
      font-style: italic;
      display: block;
    }

    .logo-text .line2 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: 0.5px;
      display: block;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .description {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-accept {
      background: linear-gradient(180deg, #2ecc71, #27ae60);
    }

    .btn-reject {
      background: linear-gradient(180deg, #e74c3c, #c0392b);
    }

    @media (max-width: 480px) {
      .cookie-card {
        padding: 28px 20px;
      }
      .title { font-size: 20px; }
      .buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="cookie-card">
    <div class="logo">
      <!-- Ícone simples em SVG: celular com globo (tema viagem/documento) -->
      <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="10" y="6" width="36" height="54" rx="6" ry="6" fill="#1e3a8a"/>
        <rect x="14" y="12" width="28" height="38" rx="2" ry="2" fill="#ffffff"/>
        <circle cx="44" cy="36" r="14" fill="#22c55e" stroke="#ffffff" stroke-width="2"/>
        <path d="M30 36 h28 M44 22 v28 M34 28 q10 8 20 0 M34 44 q10 -8 20 0" stroke="#ffffff" stroke-width="1.5" fill="none"/>
        <circle cx="28" cy="56" r="2" fill="#ffffff"/>
        <path d="M20 20 l4 4 l8 -8" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-text">
        <span class="line1">Agendando</span>
        <span class="line2">PASSAPORTE</span>
      </div>
    </div>

    <h1 class="title">Configuração de Cookies</h1>
    <p class="description">
      Este site utiliza cookies para oferecer a melhor experiência.<br>
      Escolha sua configuração preferida.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-accept" id="btnAccept">Aceitar Cookies</a>
      <a href="#" class="btn btn-reject" id="btnReject">Recusar Cookies</a>
    </div>
  </div>

  <script>
    // Troque a URL abaixo pela URL de destino da sua oferta
    const URL_DESTINO = "#";

    document.getElementById('btnAccept').setAttribute('href', URL_DESTINO);
    document.getElementById('btnReject').setAttribute('href', URL_DESTINO);
  </script>
</body>
</html>
